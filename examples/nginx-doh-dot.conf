# =========================================================================
# High-Performance Nginx Gateway Configuration for Secure DNS Architecture
# Features SNI-Based Blackholing for DoT and Cloudflare Proxy Real-IP Parsing for DoH
# =========================================================================

# 1. TCP Handling: DNS-over-TLS (DoT) Gateway Execution Block
stream {
    # Map Nginx's native TLS SNI variable to isolate backends.
    # Protects the DNS core from direct automated IP scanners.
    map $ssl_server_name $dot_backend {
        dot.vpsdns.co.za    127.0.0.1:8853; # Legitimate domain routes to DNS Core
        default             127.0.0.1:9;    # Raw IP scanners get blackholed to discard port
    }

    server {
        listen 853 ssl;
        
        ssl_certificate /etc/letsencrypt/live/vpsdns.co.za/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vpsdns.co.za/privkey.pem;

        # Route using the validated TLS map variable
        proxy_pass $dot_backend;
        proxy_protocol on; 
    }
}

http {
    # =========================================================================
    # HTTP Server - Global Redirect to Secure HTTPS
    # =========================================================================
    server {
        listen 80;
        server_name vpsdns.co.za www.vpsdns.co.za doh.vpsdns.co.za;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Main Application & Portfolio Website Layer (Cloudflare Proxy Protected)
    # =========================================================================
    server {
        listen 443 ssl;
        server_name vpsdns.co.za www.vpsdns.co.za;

        ssl_certificate /etc/nginx/ssl/vpsdns.pem;
        ssl_certificate_key /etc/nginx/ssl/vpsdns.key;

        # Main frontend / web app interface
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Application API endpoint routing
        location /api/ {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # =========================================================================
    # Dedicated DNS-over-HTTPS (DoH) Endpoint Server Layer
    # =========================================================================
    server {
        listen 443 ssl;
        server_name doh.vpsdns.co.za;

        ssl_certificate /etc/nginx/ssl/vpsdns.pem;
        ssl_certificate_key /etc/nginx/ssl/vpsdns.key;

        # Exact match constraint for official DoH resolution (RFC 8484)
        location = /dns-query {
            proxy_pass http://127.0.0.1:8053/dns-query; # Cleartext HTTP proxy stream to DNS Core

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";

            # Extract client true source IP from Cloudflare proxy headers for internal logging
            proxy_set_header X-Real-IP $http_cf_connecting_ip;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }

        # Redirect generic root directory web requests back to main landing domain
        location / {
            return 301 https://vpsdns.co.za$request_uri;
        }
    }
}
