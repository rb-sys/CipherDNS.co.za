# =========================================================================
# Example Production Nginx Configuration
# =========================================================================
# Features:
# - HTTPS reverse proxy
# - DNS-over-HTTPS (DoH)
# - HTTP/2 + HTTP/3 (QUIC)
# - Websocket support
# - API routing
# - Metrics endpoints
#
# Replace certificate paths, tokens, credentials, and upstream addresses
# before deploying in production.
# =========================================================================

# =========================================================================
# UPSTREAM POOLS
# =========================================================================
# Persistent upstream connection pool for high request volumes
upstream technitium_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# =========================================================================
# HTTP REDIRECT SERVER
# =========================================================================
server {
    listen 80;
    listen [::]:80;

    server_name vpsdns.co.za www.vpsdns.co.za doh.vpsdns.co.za;

    # Redirect all plaintext traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================================================
# MAIN WEBSITE & PUBLIC API ENDPOINTS
# =========================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    http2 on;

    server_name vpsdns.co.za www.vpsdns.co.za;

    # TLS Configuration
    ssl_certificate /path/to/fullchain.pem;
    ssl_certificate_key /path/to/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # If using Cloudflare or another proxy service,
    # configure the real_ip module appropriately.

    # =========================================================================
    # Frontend Web Application
    # =========================================================================
    location / {
        proxy_pass http://127.0.0.1:6000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Public DNS Statistics API
    # =========================================================================
    location /api/dns-stats {
        proxy_pass http://127.0.0.1:7000/api/dashboard/stats/get?type=LastHour&token=REPLACE_WITH_TOKEN;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Short cache to reduce backend load
        proxy_buffering on;
        expires 10s;

        add_header Cache-Control "public, no-transform";
    }

    # =========================================================================
    # Root Server Metrics Endpoint
    # =========================================================================
    location ^~ /api/root-metrics {
        auth_basic off;

        # Allow browser-based dashboards and graphing tools
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle CORS preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Content-Length 0;

            return 204;
        }

        proxy_pass http://127.0.0.1:11000/metrics;

        # Internal metrics authentication
        proxy_set_header Authorization "Basic REPLACE_WITH_BASE64_CREDENTIALS";

        proxy_set_header Host 127.0.0.1:10000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # =========================================================================
    # Websocket API Gateway
    # =========================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:9000/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;

        proxy_cache_bypass $http_upgrade;
    }
}

# =========================================================================
# DNS-OVER-HTTPS SERVER
# =========================================================================
server {
    # HTTPS listeners
    listen 443 ssl;
    listen [::]:443 ssl;

    # HTTP/2
    http2 on;

    # HTTP/3 / QUIC listeners
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name doh.vpsdns.co.za;

    # TLS Configuration
    ssl_certificate /path/to/fullchain.pem;
    ssl_certificate_key /path/to/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_session_cache shared:DoH_SSL:10m;
    ssl_session_timeout 1h;

    # Enable TLS 0-RTT
    ssl_early_data on;

    # Advertise HTTP/3 support
    add_header Alt-Svc 'h3=":443"; ma=86400';

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================================================================
    # RFC 8484 DNS-over-HTTPS Endpoint
    # =========================================================================
    location = /dns-query {
        proxy_pass http://technitium_backend/dns-query;

        # Reuse persistent upstream connections
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forward original client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional protocol visibility header
        proxy_set_header X-Using-Quic $http3;

        # Optimized for streaming DNS traffic
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_buffering off;
    }

    # Redirect non-DoH browser requests
    location / {
        return 301 https://vpsdns.co.za$request_uri;
    }
}
